services:
  # Backend FastAPI Service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nabu-backend
    ports:
      - "8000:8000"
    environment:
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - API_V1_STR=${API_V1_STR:-/api/v1}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_MAX_TOKENS=${OPENAI_MAX_TOKENS:-4000}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.1}
      - DATA_API_URL=http://data:8080
    volumes:
      - ./ai/data:/app/data
      - ./ai/output:/app/output
      - ./ai/cache:/app/cache
      - ./ai:/app/ai
      - ./backend:/app/backend
    networks:
      - nabu-network
    depends_on:
      - ai-service
      - data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # AI Processing Service
  ai-service:
    build:
      context: .
      dockerfile: ai/Dockerfile
    container_name: nabu-ai
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_MAX_TOKENS=${OPENAI_MAX_TOKENS:-4000}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.1}
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-5}
      - REQUEST_DELAY=${REQUEST_DELAY:-1.0}
      - CHUNK_SIZE=${CHUNK_SIZE:-1000}
      - DATA_DIR=/app/data
      - OUTPUT_DIR=/app/output
      - CACHE_DIR=/app/cache
    volumes:
      - ./ai/data:/app/data
      - ./ai/output:/app/output
      - ./ai/cache:/app/cache
      - ./ai:/app/ai
    networks:
      - nabu-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "from src.infrastructure.config import Config" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  data:
    build:
      context: .
      dockerfile: data/Dockerfile
    container_name: nabu-data
    ports:
      - "8081:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    networks:
      - nabu-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nabu-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_APP_AI_API_BASE_URL=${VITE_APP_AI_API_BASE_URL:-http://backend:8000}
      - VITE_APP_AI_API_VERSION=${VITE_APP_AI_API_VERSION:-v1}
      - VITE_APP_DATA_API_BASE_URL=${VITE_APP_DATA_API_BASE_URL:-http://data:8080}
      - VITE_APP_ENVIRONMENT=${VITE_APP_ENVIRONMENT:-development}
      - VITE_APP_DEBUG=${VITE_APP_DEBUG:-true}
      - VITE_APP_ENABLE_ANALYTICS=${VITE_APP_ENABLE_ANALYTICS:-false}
      - VITE_APP_ENABLE_LOGGING=${VITE_APP_ENABLE_LOGGING:-true}
      - VITE_APP_ENABLE_CHAT_HISTORY=${VITE_APP_ENABLE_CHAT_HISTORY:-true}
      - VITE_APP_MAX_RECOMMENDATIONS=${VITE_APP_MAX_RECOMMENDATIONS:-10}
      - VITE_APP_MAX_SUGGESTED_QUESTIONS=${VITE_APP_MAX_SUGGESTED_QUESTIONS:-8}
      - VITE_APP_TYPING_INDICATOR_DELAY=${VITE_APP_TYPING_INDICATOR_DELAY:-1000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - nabu-network
    depends_on:
      - backend
      - data
    restart: unless-stopped

networks:
  nabu-network:
    driver: bridge
    name: nabu-network

volumes:
  ai-data:
    driver: local
  ai-output:
    driver: local
  ai-cache:
    driver: local
